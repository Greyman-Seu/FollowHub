# FollowHub local config template
#
# Recommended usage in this repo:
# 1. cp config.example.yaml config.yaml
# 2. Fill in access_key_id and secret_access_key
# 3. Either export FOLLOWHUB_CONFIG="$PWD/config.yaml"
#    or pass --config-file ./config.yaml to the helper script

rclone:
  # Cloudflare R2 account id from the S3 API endpoint:
  # https://<account_id>.r2.cloudflarestorage.com/<bucket>
  account_id: 55089addaf72336be3109073072340fd

  # R2 API credentials for write/list/delete operations.
  # Public custom domains do not replace these credentials for uploads.
  access_key_id: your_r2_access_key_id
  secret_access_key: your_r2_secret_access_key

  # Bucket name
  bucket: followhub

  # Public URL returned after upload
  public_base_url: https://followhub.tenstep.top

arxiv_fig:
  # Upload matched local figures under this bucket prefix.
  # Example result:
  # papers/2604.20834-joyai-ra/architecture-overview.jpg
  cloudflare_bucket_dir: papers

  # Resize images before upload so PDF-like readability is preserved
  # without burning too much free storage/ops quota.
  max_image_long_side: 1600
  jpeg_quality: 82

  # If rule-based matching is weak, record keyword suggestions for later tuning.
  low_confidence_threshold: 12

rss:
  # Keep large source lists in a separate file when subscriptions grow.
  # Example: rss_sources.yaml
  sources_file: rss_sources.yaml

  daily:
    # Keep only recent entries per source in the daily raw bundle.
    lookback_days: 2
    max_items_per_source: 50

  # Small setups can inline sources here instead of using sources_file.
  sources: []
